<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<title>Ripple API Tester</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0f13; color: #e0e0e0; min-height: 100vh; }
  header { background: #1a1a2e; padding: 16px 24px; border-bottom: 1px solid #2a2a3e; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; color: #7c6ff7; }
  .token-bar { font-size: 12px; color: #888; }
  .token-bar span { color: #4ade80; font-family: monospace; }
  .layout { display: grid; grid-template-columns: 220px 1fr 1fr; gap: 0; height: calc(100vh - 57px); }
  
  /* Sidebar */
  .sidebar { background: #13131f; border-right: 1px solid #2a2a3e; overflow-y: auto; }
  .sidebar-group { padding: 12px 0; border-bottom: 1px solid #1e1e30; }
  .sidebar-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #555; padding: 0 16px 8px; }
  .sidebar button { display: block; width: 100%; text-align: left; padding: 9px 16px; background: none; border: none; color: #aaa; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .sidebar button:hover { background: #1e1e30; color: #fff; }
  .sidebar button.active { background: #2a2060; color: #7c6ff7; border-left: 2px solid #7c6ff7; }
  .method-tag { font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 3px; margin-right: 6px; }
  .POST { background: #1a3a2a; color: #4ade80; }
  .GET  { background: #1a2a3a; color: #60a5fa; }

  /* Form panel */
  .form-panel { padding: 24px; overflow-y: auto; border-right: 1px solid #2a2a3e; }
  .form-panel h2 { font-size: 15px; margin-bottom: 16px; color: #fff; }
  label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; margin-top: 12px; }
  input, textarea { width: 100%; background: #1a1a2e; border: 1px solid #2a2a3e; color: #e0e0e0; border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: monospace; outline: none; transition: border 0.15s; }
  input:focus, textarea:focus { border-color: #7c6ff7; }
  textarea { resize: vertical; min-height: 80px; }
  .btn { margin-top: 16px; width: 100%; padding: 10px; background: #7c6ff7; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: #6a5de0; }
  .btn:active { background: #5a4dcc; }
  .btn:disabled { background: #444; cursor: not-allowed; }
  .hint { font-size: 11px; color: #555; margin-top: 6px; }

  /* Response panel */
  .response-panel { padding: 24px; overflow-y: auto; }
  .response-panel h2 { font-size: 15px; margin-bottom: 16px; color: #fff; }
  .status-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
  .status-ok  { background: #1a3a2a; color: #4ade80; }
  .status-err { background: #3a1a1a; color: #f87171; }
  pre { background: #13131f; border: 1px solid #2a2a3e; border-radius: 8px; padding: 14px; font-size: 12px; white-space: pre-wrap; word-break: break-all; line-height: 1.6; min-height: 120px; color: #c9d1d9; }
  .empty { color: #444; font-style: italic; }
</style>
</head>
<body>

<header>
  <h1>🌊 Ripple API Tester</h1>
  <div class="token-bar" id="tokenBar">Token: <span>chưa login</span></div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-group">
      <div class="sidebar-label">Auth</div>
      <button class="active" onclick="show('register')"><span class="method-tag POST">POST</span>Register</button>
      <button onclick="show('login')"><span class="method-tag POST">POST</span>Login</button>
    </div>
    <div class="sidebar-group">
      <div class="sidebar-label">Logs</div>
      <button onclick="show('createLog')"><span class="method-tag POST">POST</span>Create Log</button>
      <button onclick="show('getLogs')"><span class="method-tag GET">GET</span>Get Logs</button>
      <button onclick="show('getStats')"><span class="method-tag GET">GET</span>Get Stats</button>
      <button onclick="show('getRecent')"><span class="method-tag GET">GET</span>Recent Logs</button>
    </div>
    <div class="sidebar-group">
      <div class="sidebar-label">Chat</div>
      <button onclick="show('chat')"><span class="method-tag POST">POST</span>Chat AI</button>
    </div>
  </div>

  <!-- Form panel -->
  <div class="form-panel" id="formPanel">
    <!-- dynamic -->
  </div>

  <!-- Response panel -->
  <div class="response-panel">
    <h2>Response</h2>
    <div id="statusBadge"></div>
    <pre id="responseBox"><span class="empty">Chưa có response...</span></pre>
  </div>
</div>

<script>
const BASE = 'http://localhost:3000/api';
let token = localStorage.getItem('ripple_token') || '';
let currentView = 'register';

function updateTokenBar() {
  const bar = document.getElementById('tokenBar');
  bar.innerHTML = token
    ? `Token: <span>${token.substring(0, 30)}...</span>`
    : `Token: <span style="color:#f87171">chưa login</span>`;
}
updateTokenBar();

const forms = {
  register: {
    title: 'POST /api/auth/register',
    fields: [
      { id: 'reg_username', label: 'Username', placeholder: 'cas123' },
      { id: 'reg_email', label: 'Email (optional)', placeholder: 'cas@email.com' },
      { id: 'reg_password', label: 'Password', placeholder: '••••••••', type: 'password' },
      { id: 'reg_displayName', label: 'Display Name', placeholder: 'Cas' },
    ],
    action: async () => {
      return await call('POST', '/auth/register', {
        username: v('reg_username'),
        email: v('reg_email') || undefined,
        password: v('reg_password'),
        displayName: v('reg_displayName') || undefined,
      });
    }
  },
  login: {
    title: 'POST /api/auth/login',
    fields: [
      { id: 'log_username', label: 'Username', placeholder: 'cas123' },
      { id: 'log_password', label: 'Password', placeholder: '••••••••', type: 'password' },
    ],
    action: async () => {
      const res = await call('POST', '/auth/login', {
        username: v('log_username'),
        password: v('log_password'),
      });
      if (res?.token) {
        token = res.token;
        localStorage.setItem('ripple_token', token);
        updateTokenBar();
      }
      return res;
    }
  },
  createLog: {
    title: 'POST /api/logs',
    hint: '⚠️ Cần login trước để có token',
    fields: [
      { id: 'cl_mood', label: 'Mood', placeholder: 'sad / happy / anxious / neutral' },
      { id: 'cl_moodScore', label: 'Mood Score (1-10)', placeholder: '4' },
      { id: 'cl_factors', label: 'Factors (comma separated)', placeholder: 'work, sleep, family' },
      { id: 'cl_note', label: 'Note', placeholder: 'hôm nay mệt mỏi quá...', type: 'textarea' },
    ],
    action: async () => {
      const factors = v('cl_factors').split(',').map(s => s.trim()).filter(Boolean);
      return await call('POST', '/logs', {
        mood: v('cl_mood'),
        moodScore: parseInt(v('cl_moodScore')),
        factors,
        note: v('cl_note') || undefined,
      }, true);
    }
  },
  getLogs: {
    title: 'GET /api/logs',
    hint: '⚠️ Cần login trước để có token',
    fields: [
      { id: 'gl_limit', label: 'Limit (default 20)', placeholder: '20' },
      { id: 'gl_offset', label: 'Offset (default 0)', placeholder: '0' },
    ],
    action: async () => {
      const limit = v('gl_limit') || '20';
      const offset = v('gl_offset') || '0';
      return await call('GET', `/logs?limit=${limit}&offset=${offset}`, null, true);
    }
  },
  getStats: {
    title: 'GET /api/logs/stats',
    hint: '⚠️ Cần login trước để có token',
    fields: [],
    action: async () => await call('GET', '/logs/stats', null, true),
  },
  getRecent: {
    title: 'GET /api/logs/recent',
    hint: '⚠️ Cần login trước để có token',
    fields: [],
    action: async () => await call('GET', '/logs/recent', null, true),
  },
  chat: {
    title: 'POST /api/chat',
    hint: '⚠️ Cần login trước để có token',
    fields: [
      { id: 'chat_msg', label: 'Tin nhắn', placeholder: 'hôm nay mình cảm thấy mệt mỏi quá...', type: 'textarea' },
    ],
    action: async () => {
      return await call('POST', '/chat', {
        messages: [{ role: 'user', content: v('chat_msg') }],
      }, true);
    }
  },
};

function v(id) {
  return document.getElementById(id)?.value?.trim() || '';
}

async function call(method, path, body, auth = false) {
  const headers = { 'Content-Type': 'application/json' };
  if (auth && token) headers['Authorization'] = `Bearer ${token}`;

  const opts = { method, headers };
  if (body && method !== 'GET') opts.body = JSON.stringify(body);

  const res = await fetch(BASE + path, opts);
  const data = await res.json().catch(() => ({}));

  const badge = document.getElementById('statusBadge');
  badge.innerHTML = `<span class="status-badge ${res.ok ? 'status-ok' : 'status-err'}">${res.status} ${res.ok ? '✓' : '✗'}</span>`;
  document.getElementById('responseBox').textContent = JSON.stringify(data, null, 2);

  return data;
}

function show(view) {
  currentView = view;
  document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  const f = forms[view];
  const panel = document.getElementById('formPanel');

  const fieldsHtml = f.fields.map(field => `
    <label>${field.label}</label>
    ${field.type === 'textarea'
      ? `<textarea id="${field.id}" placeholder="${field.placeholder}" rows="3"></textarea>`
      : `<input id="${field.id}" type="${field.type || 'text'}" placeholder="${field.placeholder}" />`
    }
  `).join('');

  panel.innerHTML = `
    <h2>${f.title}</h2>
    ${f.hint ? `<p class="hint">${f.hint}</p>` : ''}
    ${fieldsHtml}
    <button class="btn" id="sendBtn" onclick="handleSend()">Gửi Request</button>
  `;

  // Clear response
  document.getElementById('statusBadge').innerHTML = '';
  document.getElementById('responseBox').innerHTML = '<span class="empty">Chưa có response...</span>';
}

async function handleSend() {
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = 'Đang gửi...';
  try {
    await forms[currentView].action();
  } catch (e) {
    document.getElementById('responseBox').textContent = 'Lỗi kết nối: ' + e.message;
    document.getElementById('statusBadge').innerHTML = '<span class="status-badge status-err">Network Error</span>';
  }
  btn.disabled = false;
  btn.textContent = 'Gửi Request';
}

// Init
show('register');
</script>
</body>
</html>
